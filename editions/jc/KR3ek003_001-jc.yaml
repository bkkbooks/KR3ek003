body:
  text: 卷上論治先生問師曰癰疽之異何重何輕視外得內據形知死生以何別之師曰皮膚之深肌肉之淺浮虛以廣或蔓延三四遊走旁註此則癰也曰治之何先曰成者泄之盛者疾之攻內後外三日成功此言癰成而有膿者當針以泄之熱毒盛者針以疾出之曰癰之治即聞矣疽可得聞乎師曰甚哉五臟銳毒而為疽熱蘊乎五臟而聚氣逆乎諸陽而欲越會丹府燥榮衛大盛而作結乎此根於裡十之已七毒諸外三見其一小形堅本銳若纖足欲觸搖畏痛心腦骨寒熱以乘陽之證悉具來者速泄陽會敗者急救其里泄會言灸救裡言藥巧工如經先時具全未越未透妙在揭指針也出皮膚曰越問曰病有至甚而生至微而死病證唯辨死生何從決乎答曰發背透膜者死不治此言肝腧以上未潰內陷面青唇黑便汙者死此言臟壞便見瘀血潰喉者不治陰入腹者不治入囊者死鬢深及寸者不治謂如及寸針者左頤後一寸三分毒銳者不治無此者生流注雖多療之必愈問曰針灸之法不一何者為工答曰針固妙法不得其旨禍若反掌灸亦要道熱病必亡謂如九毒心火俱盛而劫之以火於瘡上而灸之則立死問曰癰疽之病有取乎脈否答曰聖人周知治病若合符節非脈而何脈之周身安則至常衰盛遲數於此以決生死病甚反遲逆也病痿猶數未瘥也遲冷數熱瞭然不匿洪數緊盛乃病之脈病今隆結雖盛不畏及濡而沉死在七月綿微不治病在上焦寸不能應浮於皮膚者為癰為順入於肌肉者為疽為逆病在下焦寸反攻盛尺不能應遲數順逆尤存乎消息浮滑而透寸沉實而滑堅此金石脈也厥陰陽明數而實食毒也堅牢癰結太陰遇厥陰弦榮少專經所主以九部稱之問曰五善七惡可得聞乎答曰飲食如常一善也實熱而大小便澀二善也內外病相應三善也肌肉好惡分明四善也用藥如所料五善也發渴而喘精明眼角向鼻大小便反滑一惡也氣綿綿而脈濡與病相反二惡也目中不了了精明內陷三惡也未潰肉黑以陷四惡也已潰青黑腐筋骨黑五惡也發痰六惡也嘔吐七惡也夫人稟五行之氣而生者金木水火土是也故分配四季有陰陽寒暑之位順之則風調而氣和逆之則風亂而氣悖百病所以生也雖人能知其理奈緣四時之氣或有乘失故表竅不勻三焦壅塞血澀肌表致有五發癰疽之患也發者五臟六腑不和之所生蓋五臟主裡氣生經絡而沉六腑主表氣生經絡而浮若喜怒不常飲食不節陰陽不調冷熱相干於是臟氣虛則腠理開疏腠理開疏則寒邪客熱於經絡之間寒氣既折則榮衛稽留於脈且榮者血也衛者氣也血榮得寒則澀不行衛氣從之與寒邪相搏故壅遏不通氣者陽也陽氣蘊積則生熱熱則血澀寒熱不散故積聚為癰疽疽之狀氣內攻皮厚強實痹而生寒寒久發熱寒熱蓄積故傷肉而不壞肌肌壞則化為膿血夫癰患屬表骨髓不枯易為醫治疽患屬裡傷骨壞筋則難調理經曰一寸二寸為癰以上至一尺來許者為疽其五發各有五色起因瘭癌疽痼之四發各有顏色惟小者為癰所治頗為易耳凡人才覺發作結聚發作寒熱或不寒只熱之狀疼痛腫赤瘢痕闊硬若過五寸以來者或在頭背或在肢節或不見形狀者便宜下大車螯散如只三寸二寸瘢痕者只下小車螯散如癰已破既不可用大小車螯散今畫出五發形象顏色圖之於後正發論正發者脈洪盛頭痛發寒熱大便結小便赤痛徹骨筋眼睛疼痛如陽證傷寒但苦痛有形腫赤不可近手腫赤焮長上有如煙漿沸潑者如粟米之白者皆風毒心火三者所並而然也當下大黃犀角生地黃汁絲瓜汁之藥與正藥並行之仍相度用針灸乘其未膿而攻之得宣以不潰而愈此上工也渴者無畏大小便結赤渴而喘無畏大小便滑者逆善惡前論癰疽五發一曰癌癌疾初發卻無頭緒只是肉熱痛過一七或二七忽然紫赤微腫漸不疼痛迤邐軟熟紫赤色只是不破宜下大車螯散取之然後服排膿敗毒托裡內補等散破後用麝香膏貼之五積丸散疏風和氣次服余藥方見後二曰瘭布昭切瘭者始初聚結尖腫根腳赤白色高處帶紅赤腫實疼痛憎寒壯熱口乾渴百節疼痛困倦沉重飲食者未破者即下大車螯散如先破下小車螯散然後服輕肌活膿內托等藥次洗點破等藥加服小車螯散膿毒不決即服二三取活膿血三曰疽疽初起如麻豆子大癢痛抓破如小瘡後漸結瘢痕作㿉以次皮破竅穴漸如蜂房多有膿毒不出結痛憎寒多熱滿悶無力頭目昏眩百節拘急睡臥不得或有吐逆日加煩痛瘡如火燒更不可服大車螯散只服小車螯散與解關輕肌活體等散止疼痛退寒熱解昏眩仍勤用洗貼去爛肉與膿毒方見後四曰痼痼發者形狀三兩個或手背不日消退自破苦無膿血毒汁意以為安愈忽因消渴腎所攻及至春冬再在背膊或腎腧上生一個二個疼痛赤腫腰疼筋緊拘急吃多物常飢燥小便赤大便澀三五日一通或破下小車螯散未破下大車螯散逐日下內消內解散方見後五曰癰癰初起突如蒸餅又如魚形一頭大或多頭小或橫在背膊或在脅肋間及二三寸許堅實赤腫時發熱疼痛如未破服大車螯散已破服小車螯散次用內解內消等藥與治痼法治之問曰古今之用藥制度與夫金石之變草木之反虛實之蒸食毒之發願盡言之答曰古之治病隨證施設如箭中的故應手而愈妙體存乎心模體行以意今人之體古方書無有加減禍福相半古稱單方療病為效最切擇以佐使斯為治病癰疽之疾如山源之水一夕暴漲非決其要會支之大渠使殺其勢則橫潦為災猛烈之疾以猛烈之藥此所謂以毒攻毒也金丹之性真水不勝客火上炎草木之反熱毒蘊結五金八石各從其類硃砂下砒硝石化伏伏謂伏火丹也犀角大黃攻治無畏仙芝無虛實證此外則針灸佐之謂如仙芝方它方非針灸佐之不可千金方惟五香連翹散豬蹄湯萬金犀角丸有準鬼遺方世稱奇妙究其所以除木占斯散未聞可以施手而敗醬占斯世皆莫識遂為文具蘇梗忍冬不能救急綠豆乳香可治金石舉此顯顯數者以別是非爾後不可概舉然倉卒之間醫者紛紛莫知適從上下畢備乃可成事應入門看候便須以醋調藥未潰者當心點之如棋子大良久視其痛與不痛不知痛者加一點不痛良久又加一點至滿上而不痛及痛如昔者為入肉為不應藥以上論仙芝無他法只以本方用之已潰者棯子試之及數與未及數者決輕重應點隨手而痛者妙食頃者四分又食頃者七分此言尋常痛今點愈痛昔日痛今不痛皆應上法消息在臨時之妙須定意商量蓋於此時決死生也即應病服藥初進二錢如五里進三錢如五里進四錢如早至晚六錢止如此兩者亦言以毒攻毒也此言仙芝余藥依本法當日進藥三服後即用藥敷之圍瘡四面所闊腫處以防其它注視其東西四向除以上法塗圍外於其頭上用藥一點此妙不傳之秘也試法論瘡已潰須用好厚紙作一合索棯子捻入看分數如背上自肝腧以上試直入無偏斜及一寸三分者為將通十全三四過此不治雖過數而精神強者須以竹膜一片可敷瘡口密者先擇一淨明室中以水濕瘡口四旁然後敷竹膜在靜看其動似氣之拽拽則已通矣非風非扇而與呼吸相應十死不治無此者可療余法載前論一應背潰皆以此法試至妙如無大竹膜可糊合為之腐肉色青黑缺牙不附骨者用煉刀竹刀割之或已腐而肌肉薄者不可割當下食惡肉膏先熏後用應潰後無死證可下手不然不治證見前論長肉之法須惡肉盡乃可下下而看淫淫生而有紅黃者紅黃者吉淫生而無肉意青黑者凶未下前先用藥湯洗洗後復用蔥少鹽多湯洗之微干乃可用忌一切厭穢婦人孝子見之下後仍不許他人揭看大凡無淫肉不生淫上有一層淫淫如黃綿在肉之上也有膿者脈洪數而緊痛如刀錐雞啄按之似欲隨手當先以取膿針潰之潰之而脈愈證退不加針灸唯平補而愈當用十奇散之類潰而證不退加針灸法又有肉裡癰一證在好肉之裡有膿當決之否則成附骨決而以油捻子塞之良久乃出可以盡毒應行肉裡針須量其人平日飲量以酒調藥乘其服藥酒後而決之然背無此證厚肉有之腸癰在膚准此打針法用馬銜鐵於甲子日一日煉打陽針一枚如韭葉長三寸六分丁酉日打陰針一枚長二寸四分驚蟄日打雷鋒針一枚長二寸四分又打取膿針一枚如韭葉長三寸六分打煉刀一枚小釣一個上用桑白皮紫藤香煮一周時以紫藤香末藏之陽針針獨疽陰針針癰雷鋒針針怪形非怪形者必須辨認仔細乃可針或以尾為頭誤人不淺中脊膊貼大痛不止先後失序療之難愈假如只一個瘡而四面無頭其頭在中仍不許於中點之大逆只於四旁厚塗依常法假如一個至數個須察其至甚先甚後輕先輕後甚法當先其輕者後其甚者反此者即與本方服藥不能應雖不害其命而留之日久病形雖多針敷則一收外攻內侯其聚合內毒盛者急攻其內外毒盛者速瀉其熱日夜收攻庶幾無失騎竹馬量灸法發背腦疽腸癰下部癰乳癰喉癰牙癰手足一切癰疽或胸腹不測丹癰緊硬之屬先令病人以肘憑几豎臂腕要直用篾一條自臂腕中曲處橫紋男左女右貼肉量起直至中指尖盡處截斷為準不量指爪卻用竹槓一條使病人脫衣騎定令身直前後用兩人槓起令腳不著地又令一人左右扶定勿令僵仆卻將前所量臂腕篾從竹槓坐處尾閭穴直貼脊骨量至篾盡處為準用墨點定此穴是取中非灸穴也卻用稻杆子量病人中指中節相去兩橫紋為準男左女右剪斷將稻杆准子從篾點定處兩邊各橫量一寸准子盡處取兩穴各五壯或七壯不可多灸不問癰生何處並用此法灸之無不愈也此二穴心脈所起凡癰皆心火留滯而生灸此二穴則心火即時流通不三日而愈可以起死救危有非常之功也屢試而屢驗矣素問云諸痛癢瘡皆屬於心又云榮氣不和逆於肉理則生癰腫榮氣者血也心能行血血即滯則脈不行故逆於肉理則生癰腫灸此二穴心火調暢血脈自流通愈於服藥多矣第一法先從男左女右臂腕中曲處橫紋起用薄篾一條量至中指齊肉盡處不量指爪為準剪斷第二法男以左手女以右手先將中指用薄篾量取中間一節兩橫紋斷為同身一寸為準子第三法先令病人脫去上下衣服以大竹槓一條跨定令兩人徐徐槓起足要離地五寸許兩旁以兩人扶定勿令動搖不穩卻以第一圖准子貼定竹槓從尾閭起貼脊量至准子盡處以墨點定記之非灸穴也此是取中穴止處卻以第二圖取同身寸准取兩寸平折自中穴量之以中分取傍各一寸方是灸穴治癰疽發背癤毒一切惡瘡並婦人乳癰灸法以麻皮一條從手臂大麴橫紋中度起牽至中指第二節橫紋處為定引而倍之截斷遂將此准從結喉處按定雙引兩頭垂於背脊直下取準頭盡處點定此是定高下也又以小竹篾一條比大拇指上節一寸為準卻將此准就於背中點定處旁去一寸點一穴灸五壯或七壯若已破灸後三二日間瘡口合再就前穴又引一寸點一穴五壯或七壯十壯凡此點穴亦皆男左女右灸不可絲毫失也此灸法活人甚多立有神效故鋟本附於寶書之中以救疾苦不可忽之凡點穴用灸須端坐以兩手垂於膝上頭不可俯仰動搖庶不失穴道切宜記之灸法曰諸陽熱而為癰疽故灸手左右曲池手七里肩峰骨後縫足風市足腿骨上縫骨足三里炷如麥粒各三壯立此止痛也又灸一切惡瘡並喉閉發背等每用細索或帶子以病者右手大指第二指拈直臂量當心看索之多少平折作兩半自病者喉以索只搭過至背上看至近處兩頭各更加一寸夾脊骨為穴灸各灸三壯立效趙唐卿傳
