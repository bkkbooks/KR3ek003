body:
  text: 卷下方法正藥指授散此藥本無名因先生遇老人于山自云姓徐指而授之乃號徐仙芝方散皆以為名按仙芝圓者為陽方者為陰陰陽對生面青背紫黑色根盤如蜈蚣四葉對芳五月而花有花無實凌冬不凋叢秀異於它草生深山大澤於水石之間採以五月五日採訖擇根令齊便於急水中擺去沙土挂於微帶風日處不可大把疊束恐爛不佳而氣味無力方圓各收一處不可相雜即干臨時用方圓兩根各作一包無令差誤每用磨子磨之不得近鐵取極細為度忌僧尼婦人孝子雞犬一切厭穢見之揀天德月德天醫或七月七日吉日合之依此法則其驗如神尋常疏縱不依此法則功效便遲矣即尊奉此藥不可不虔為製造殺毒定瘡即以為散用釅醋調之根敷其頭圓者敷其右方者敷其左一個時辰當住大痛若不住加一服又不住可加後藥仙芝根葉共一兩半梓寄生半兩夜明砂一兩上依前法厚調敷之風毒盛極加趙侯須一兩本草名敗醬絲瓜半兩生者佳冬日無可預霜前收臨時末之以敷生者則細切石臼中杵絞汁以一盞當一兩不用醋調只用汁調更佳此物亦有陰陽長瘦為陽短肥為陰可偶用之如煙漿沸潑風毒火丹甚者可加夜明砂通前半兩真牛黃一字犀角水磨半錢不然細末之依前法不用醋調以絲瓜汁犀角磨水調敷服食仙翁指授散仙芝四兩方圓根莖枝葉對用制如前法絲瓜一兩夜明砂一分上每用三大錢溫酒調下病在上者先食後服凡毒盛者加趙候須一兩犀角末半錢每用三錢酒調下飲酒悶者木通湯下如煙漿者加牛黃一錢赤茯苓半錢用酒調下老翁神杖散梓寄生一兩夜明砂一兩上為細末每用二錢溫酒調下催服依仙芝式敷藥如前以醋調之絲瓜汁尤佳梓寄生即梓樹上老寄生藤自地下量起與人額齊以下者不用以上者取七尺如無只取三尺六寸每條皆如此若一藤一枝者不取一藤二枝者可取擇二吉日採無令人多見採歸以利瓷片輕手刮去外黃皮再刮去中間白肉內心不用瓦上微火焙乾磨子磨之五月五日尤佳玉女飛花散蜀桑根取大者上即芫花根不用木五月五日採水中輕輕洗去土燒淡醋令沸以花根於醋中一走過覺色變白如寄生法當日採當日刮令極細每服一字溫酒一大盞放藥於盞良久面上花飛服下催服如入門式敷以絲瓜汁醋調亦可趙侯須散趙侯須即敗醬草乾者四兩苦辣回根七寸甘草節三寸乳香一錢穿山荷根即蒲桃藤根七寸上生搗為粗末乾者為細末共為一劑分三服每服用好酒三升半煎至七分去滓服敷用酒調依上法六化丹即犀角丸易名以神貴其藥而為俗子所珍因其能化風化熱化毒化結化積化膿為水故曰六也犀角生者一兩黃芩一兩大黃一兩巴豆半兩去心除油升麻一兩當歸一兩梔子一兩白蘞一兩甘草一兩炙天南星一兩黃耆一兩半防風去蘆一兩上為細末以早潮順流新汲水丸如梧桐子大每服五丸不拘時候隨證量人大小用之十奇散本法稱此藥無情全不類治癰疽者然古聖神工所制殆不可測不拘老幼已潰未潰服一二服立效據考證今收入平補藥中庶幾中的人參一兩去蘆當歸一兩去蘆黃耆一兩川芎半兩白芷半兩桔梗半兩用苦者不可用甜者甘草半兩炙桂半兩薄者去皮取心厚朴半兩去皮薑汁炙防風半兩上為細末每服二錢溫酒調下催服如前法本法加至六錢止逼毒散當歸一兩枳殼一兩去瓤炒甘草一兩炙白芷一兩貝母三兩去心上為細末每服二錢酒水各半盞煎至六分日四五服黃耆真君妙貼散硫黃好者不計多少上用蕎麥麵為窩子包黃在內於熱火中兩邊煅令黃黑取去入乳香半兩細研用井花水調以熟絹剪如所腫樣貼之留竅日兩易托裡地脈散當歸地蜈蚣赤芍藥甘草各一兩上為細末每服二錢溫酒調下黃芩散洗瘡腫爛處化惡血膿汁活血調榮衛黃芩二兩秦皮真者莽草細辛白芷川芎黃連各半兩羌活一兩半上為粗末每用一兩半以豬蹄煮熟去蹄入前藥煎數沸通手以綿惹洗癌瘡直至藥冷為度洗後使麝香膏貼春冬一日一洗夏秋一日兩洗秦皮散破與未破宜先洗以此藥消逐惡肉膿水秦皮三兩莽草二兩細辛苦參各一兩半黃芩當歸各一兩上為粗末每洗時用豬蹄湯和藥一兩同煎二十沸去滓通手以綿惹洗以五枝煎貼之芎黃散洗疽瘡化毒散膿汁生肌肉止疼痛川芎大黃黃芩何首烏各五錢當歸黃連香白芷各三錢半上為細末搗爛每用豬蹄湯煎藥數沸去滓以綿惹洗之藥冷止豬蹄湯豬蹄一隻治如食法黃耆三兩黃連三錢芍藥三兩黃芩二兩狼牙根二兩薔薇根二兩上以水三斗煮豬蹄令熟澄取二斗六升或一斗六升下諸藥煎取一斗去滓分三服洗瘡槐白皮湯槐白皮一兩桑白皮紫藤香即降真香防風各半兩上㕮咀水三升煎至升半代豬蹄湯洗熏藥雄黃好者一兩雌黃一兩蚌粉三兩上為細末用闊口瓶入米醋一升不蛀皂角一挺藥末五錢同煎至沸以氣熏瘡冷欲盡再燒半挺炭投醋中取氣熏之直至炭淬醋盡為度日一用活血散治膿出不快肢體悶痛寒熱無時口苦舌乾不思飲食金星草五葉川芎羌活各一分人參半兩甘草三分上為末每服二錢溫下日三服如大腫赤疼痛用麥門冬五錢搗爛熱調令清以鵝毛刷在瘭腫瘢上輕肌丸止疼化毒除膿寒熱煩躁腳手無力四肢倦虛渴氣乏不勻慈姑一兩何首烏甘草炙各三分獨行一兩去皮地黃半兩蝦啾唧三分上為末每服二錢水一盞薄荷七葉煎至八分溫酒下大車螯散車螯一個黃泥田濟通紅煅去泥置地上去火氣大戟淨洗芫花醋炒漏蘆甘草炙檳榔各半兩甘菊去梗葉其梗一名傅延年大黃三分膩粉一分上各為末每服二錢車螯末二錢膩粉一錢拌和於更初用栝蔞酒下如人行五里即下惡毒膿血二三行不用止自住凡後生只一服老少加減小車螯散車螯二分輕粉二錢甘草一分栝蔞一個上各為末和勻每服二大錢五更初煎栝蔞酒調下內托散大止疼痛如未破即點破有膿川烏一兩炮茯苓三分苦杖半兩獨活白芷甘草炙各一兩上為末每服二錢酒調下日三服解關散治疽毒頭痛寒熱心煩悶躁肌困無力去惡毒膿血麻黃三分去節大黃三分肉桂半分甘草半兩炙訶子五個去核枳殼木通各一兩木瓜一個上為末每服二錢水一盞薑三片蔥白三寸連須煎至八分通日服片時自然汗出再進數服痛熱即減金花散順氣補內去邪毒治疽皮燥痛快膿止疼蒲黃一兩赤芍藥二分地骨皮蔓荊子各半兩石菖蒲一分甘草三分上為末每服二錢溫酒下薄荷湯亦可排膿散去疼膿逐惡血化腫毒退寒熱防風一兩洗仙靈脾即淫羊藿甘草炙各半兩川芎半兩白芷三分人參一兩半細辛一兩半上為末每服二錢溫酒調下如不飲糯米湯下不拘時候五積勻氣丸治五發風毒逐餘毒惡氣行血脈杏仁八十一粒去皮尖巴豆八十一粒去皮研木香一分黑附子一分當歸一分小坯半兩即蘇木上為末和勻用糯米煮飯為丸如緑豆大每服五丸臨臥薄荷湯或薑湯吞下量虛實加減敗毒散已破宜服逐惡毒流清去毒濁麻黃一兩一分去節白朮蒼朮荊芥各一兩甘草三分炙大黃半兩薄荷生花者一分黃芩半兩上為末每服二錢水一盞蔥白三寸煎至八分不拘時候托裡散止疼托裡固濟臟腑山蜈蚣二兩當歸二分地黃去土甘草炙厚朴炙白朮白芷川芎各半兩川烏三分炒黑豆一合麻黃三分去節上為末每服一錢溫酒調下如不飲酒水一盞薑三片薄荷五葉同煎至八分日連進三五服內補散已破而膿汁出多瘡壞爛肌肉未生宜服此方附子一兩炮粉草三分炙茯苓半兩陳皮半兩去白白薑一分人參三分麻黃半兩官桂一錢上為末每服一錢蔥白三寸棗一個煎七分服內消散已破去膿積瘀血止痛退寒熱進飲食活百脈紅內消二兩何首烏玄參苦參蔓荊子威靈仙各半兩上為細末每服二錢溫酒調下熱水亦可不拘時活膿散治瘡毒熱痛燥肢節疼痛食減少無味天麻一兩酒浸穿山甲三分醋炙萆薢半兩羌活一分甘草三分上為末每服二錢酒調下不拘時五參丸治疽瘡經延日月傳成冷疽毒宜服此藥丹參人參苦參玄參沙參蔓荊子何首烏紫菀威靈仙木香各三分乳香一分上為末煉蜜為丸如梧桐子大空心用麝香酒下三十丸或四十丸內消丸解利風毒氣癰痼發之毒作痛煩黑附子半兩炮川烏炮去皮尖草烏水煮去皮乾蠍殭蠶各一分雄黃半兩研上為末煉蜜丸如緑豆大每服二丸薄荷酒嚼下大段發急者只作散子每服一錢薄荷酒調下內消活關輕竅散可同內解散同服更將疽發中金花散同煎服如欲洗以用芎黃散洗後用百花膏貼如漸覺消退未十分好更服瘭中內托散固濟丸再用瘭內秦皮散洗之碧油五枝煎膏藥貼之不然使癌發內作檳榔散亦得附子半兩炮川烏半兩炮去皮尖草烏一兩半如前法麻黃去節沉香一分蒼朮三分防風半兩炙萆薢一分杜仲半兩炙上為末每服二錢水一盞薑三片棗一個煎七分通口服生肉膏凡瘡即愈肉漸滿可將收口且用收口藥微摻一層乃用生肉膏蓋五日後去膏用正收藥仍蓋以油單忌傷風也檳榔半兩生地黃二兩辛夷二兩薤白五兩獨活當歸大黃白芷川芎黃芩芍藥續斷各一兩上以臘月豬脂為煎麝香膏長肉逐敗血合瘡口黑附子半兩生肉豆蔻五個去皮陳皮半兩去白皂角三莢肥者檳榔四個羌活一分黃連白芷當歸各半兩白薑大黃縮砂各一兩上細搗微爛麻油一斤於鐺內同煎又慢火煎至一半藥焦黑為度去滓再入淨鐺煎滾入黃丹篩過者五兩又入油煎乾一半許以淨瓷鉢盛之放地下出火一日桃紅散治瘡口未合爛臭瘀肉未去時水出以此摻之黃丹一兩隔紙炒硫黃三分茱萸三分輕粉四錢上為細末用麻油調和再幹之洗瘡拭摻之白檳榔散收瘡口長肉檳榔炒白芨黃柏去粗皮木香各半兩上為末輕粉二錢和勻如瘡干即以臘月豬脂調藥敷之濕則干糝紅雪散斂瘡口長肉黃柏黃連各一兩半黃丹三分隔紙炒輕粉二錢上為末凡經十餘次洗後其爛肉瘀膿不盡方用止生肌藥凡癰疽已潰多有瘀肉壞在四旁遂令瘡深寢至斷筋蝕骨法須去瘀肉用速急生肉煎庶幾不令傷風日久不愈去瘀肉法淡醋一碗入鹽一字以雞羽輕輕拂瘀肉處少頃用竹片夾縛作一摘鑷子摘去瘀肉以藥摻之川烏一分炮訶子三個去核紫藤香一分生硫黃食茱萸各半兩龍骨白蘞各一錢上為細末乾摻卻用生肉膏浮虛蓋之勿令相著其肉立生如瘡干恐痛或干已痛則用茱萸四十至五十粒清油一燈盞煎取茱萸焦調敷佳捍骨散安愈後宜用之牡丹皮一兩柴胡三分赤芍藥茯苓白芍藥當歸各半兩甘草上為末每服一錢半水一盞薑三片棗一個同煎至八分通口服一日三服不拘時乳癰凡乳癰易萌皆由氣逆寒熱相乘榮衛縫結乳汁不行而生癰四十以下治之多愈四十以上十愈四五未成者吸其乳非乳者下其已成者如癰法治之在乳房而不善治腐漏者三年而死中乳房者不救此句言針乳癰方萱草根上搗爛酒浸服滓敷又方苣霜葉上不計多少取陰乾為末如急用則焙乾之以井花水調塗不若取絲瓜汁調最妙此藥貼塗發背一切癰癤與玉女飛花散為表裡乳癰方牛角切成片蚌粉三錢匕糯米安角上同於炭火上煅成灰取七錢匕上作五服嚼乳香酒下乳香入在內尤佳導經散子皂角灰蛤粉上為細末半錢或一字溫酒調下急以手揉乳敷以天南星末用水調上未效加木別子以醋調塗次服栝蔞散栝蔞散栝蔞一兩乳香一錢上為細末每服一錢溫酒調下如有乳者急以紙五寸闊一片用火燒於三寸許置瓶中火欲過未過便以瓶口掩乳以手扶定其乳吸在瓶中覺颼颼乳在瓶則便取去急洗以藥若本無乳依癰法治危亦林得效方云熱者加石膏末少許軟癤問曰軟癤之稱何由有此答曰大人毒存而為漏小兒毒存而為軟癤逼其毒而已矣止痛水銀膏尋常小可瘡癤無膿而痛不可忍諸藥所不能止者用此立效水銀一分要好者寒水石一兩巴豆二十七粒火炮過硃砂半兩要好硫黃犀角白蘞各半兩海螵蛸黃丹煅各二兩上先以津液調和水銀如泥後和諸藥末用米飲丸如兩梧桐大取新汲井水研藥一丸當瘡心點之如水透內則住不然加之以知為度服金石人用砂糖為丸去海螵硝加朴硝半兩井花水頓進五粒便下然須識證者可使否則虛實失宜矣軟癤方宜用淡豉餅薤白淡豉各等分上二味共舂作餅掩之留瘡口泄氣又方槐樹木上自起皮青皮灰伏齣兒雞子殼瓦上燒輕粉上為細末調塗之又方銀鍋子為細末調塗之極妙雞子白調亦可治清疔穀精草要淨者蟬殼各一兩蒼朮五兩上為末每服一錢水調服食前仍以針刺疔出水用桑柴灰汁洗之立效
